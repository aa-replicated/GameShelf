apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: gameshelf
spec:
  chart:
    name: gameshelf
    chartVersion: "0.0.0"
  values:
    image:
      tag: repl{{ .VersionLabel }}
    global:
      imagePullSecrets:
        - name: '{{repl ImagePullSecretName }}'
    adminSecret: '{{repl ConfigOption "admin_secret"}}'
    siteName: '{{repl ConfigOption "site_name"}}'

apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: gameshelf
spec:
  chart:
    name: gameshelf
    chartVersion: "0.0.0"
  values:
    adminSecret: repl{{ ConfigOption `admin_secret`}}
    siteName: repl{{ ConfigOption `site_name`}}
    siteColor: repl{{ ConfigOption `site_color`}}
    customBrandingEnabled: repl{{ LicenseFieldValue `custom_branding_enabled` }}
    image:
      registry: 'repl{{ ReplicatedImageRegistry "ghcr.io/aa-replicated/gameshelf" }}'
      repository: 'repl{{ ReplicatedImageRepository "ghcr.io/aa-replicated/gameshelf" }}'
      pullPolicy: IfNotPresent
    postgresql:
      image:
        registry: 'repl{{ ReplicatedImageRegistry "index.docker.io" }}'
      volumePermissions:
        image:
          registry: 'repl{{ ReplicatedImageRegistry "index.docker.io" }}'
    redis:
      image:
        registry: 'repl{{ ReplicatedImageRegistry "index.docker.io" }}'
  builder:
    postgresql:
      image:
        registry: "docker.io"
    redis:
      image:
        registry: "docker.io"

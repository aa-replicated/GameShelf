replicaCount: 1

# Required to allow Bitnami subcharts to use proxied images
global:
  imagePullSecrets: []
  security:
    allowInsecureImages: true

imagePullSecrets: []

imageProxy:
  host: proxy.adamanthony.dev

image:
  repository: ghcr.io/aa-replicated/gameshelf
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: "traefik"
  host: ""  # required when tls.mode is not "none"
  annotations: {}
  hosts:
    - host: gameshelf.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# TLS configuration
tls:
  # Options: "none", "auto", "manual", "selfsigned"
  mode: none

  # auto: cert-manager provisions a Let's Encrypt cert via HTTP01
  auto:
    issuerEmail: ""
    # "letsencrypt-staging" or "letsencrypt-prod"
    issuer: letsencrypt-prod

  # manual: user provides an existing TLS secret
  manual:
    secretName: ""

  # selfsigned: cert-manager generates a self-signed cert (no extra config needed)

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

siteName: "GameShelf"
adminSecret: ""  # REQUIRED — set a strong secret, e.g. --set adminSecret=... or in a values override

# --- Embedded PostgreSQL (Bitnami subchart) ---
postgresql:
  enabled: true
  image:
    registry: proxy.adamanthony.dev/proxy/docker.io
  volumePermissions:
    image:
      registry: proxy.adamanthony.dev/proxy/docker.io
  auth:
    database: gameshelf
    username: gameshelf
    password: gameshelf
  primary:
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

# --- BYO PostgreSQL ---
externalDatabase:
  host: ""
  port: 5432
  database: gameshelf
  username: gameshelf
  password: ""

# --- Embedded Redis (Bitnami subchart) ---
redis:
  enabled: true
  image:
    registry: proxy.adamanthony.dev/proxy/docker.io
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 128Mi

gameshelf-sdk:
  enabled: true

# --- BYO Redis ---
externalRedis:
  host: ""
  port: 6379
  password: ""

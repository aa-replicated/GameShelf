apiVersion: v2
name: gameshelf
description: A Helm chart for GameShelf - a game collection tracking web application
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: replicated
    alias: gameshelf-sdk
    version: ~1.19
    repository: oci://registry.replicated.com/library
    condition: gameshelf-sdk.enabled
  - name: postgresql
    version: ~18.5
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: ~25.3
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

apiVersion: v2
name: gameshelf
description: A Helm chart for GameShelf - a game collection tracking web application
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: postgresql
    version: ~15.0
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: ~19.0
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gameshelf.fullname" . }}
  labels:
    {{- include "gameshelf.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "gameshelf.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gameshelf.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at {{ include "gameshelf.postgresqlHost" . }}:{{ include "gameshelf.postgresqlPort" . }}..."
              until nc -z -w2 {{ include "gameshelf.postgresqlHost" . }} {{ include "gameshelf.postgresqlPort" . }}; do
                echo "PostgreSQL not ready, retrying in 2s..."
                sleep 2
              done
              echo "PostgreSQL is reachable."
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 10m
              memory: 16Mi
      containers:
        - name: gameshelf
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gameshelf.fullname" . }}
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gameshelf.fullname" . }}
                  key: redis-url
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "gameshelf.fullname" . }}
                  key: port
            - name: SITE_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "gameshelf.fullname" . }}
                  key: site-name
            - name: ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "gameshelf.fullname" . }}
                  key: admin-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

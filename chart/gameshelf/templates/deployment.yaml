apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gameshelf.fullname" . }}
  labels:
    {{- include "gameshelf.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "gameshelf.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gameshelf.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- else }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      containers:
        - name: gameshelf
          {{- if .Values.imageProxy.host }}
          image: "{{ .Values.imageProxy.host }}/proxy/{{ .Values.imageProxy.appSlug }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          {{- else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gameshelf.fullname" . }}
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gameshelf.fullname" . }}
                  key: redis-url
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "gameshelf.fullname" . }}
                  key: port
            - name: SITE_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "gameshelf.fullname" . }}
                  key: site-name
            - name: ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "gameshelf.fullname" . }}
                  key: admin-secret
            - name: SDK_SERVICE_URL
              value: "http://gameshelf-sdk:3000"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

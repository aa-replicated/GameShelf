{{ define "index.html" }}
{{ template "base.html" . }}
{{ end }}

{{ define "content" }}
<div class="mb-8">
  <h1 class="text-4xl font-extrabold text-gray-900 mb-2">Game Library</h1>
  <p class="text-gray-500 text-lg">Pick a game and start playing!</p>
</div>

{{ if not .Games }}
<p class="text-gray-400 text-center py-16">No games available right now.</p>
{{ else }}
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
  {{ range .Games }}
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-all hover:-translate-y-0.5">
    <div class="h-2" style="background-color: var(--color-primary)"></div>
    <div class="p-6">
      <h2 class="text-xl font-bold text-gray-900 mb-2">{{ .Name }}</h2>
      <p class="text-gray-500 text-sm mb-5 min-h-[2.5rem]">{{ .Description }}</p>
      <div class="flex gap-2">
        <a href="/games/{{ .Slug }}"
           class="flex-1 text-center py-2 px-4 rounded-lg text-white font-semibold text-sm transition-opacity hover:opacity-90"
           style="background-color: var(--color-primary)">
          ▶ Play
        </a>
        <a href="/leaderboard/{{ .Slug }}"
           class="flex-1 text-center py-2 px-4 rounded-lg border border-gray-200 text-gray-600 font-semibold text-sm hover:bg-gray-50 transition-colors">
          🏆 Scores
        </a>
      </div>
    </div>
  </div>
  {{ end }}
</div>
{{ end }}
{{ end }}

name: PR

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ghcr.io/aa-replicated/gameshelf:pr-${{ github.event.pull_request.number }}

      - name: Update Helm dependencies
        run: helm dependency update chart/gameshelf

      - name: Create Replicated release
        uses: replicatedhq/replicated-actions/create-release@v1.20.0
        with:
          app-slug: gameshelf
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          yaml-dir: .
          version-label: pr-${{ github.event.pull_request.number }}-${{ github.run_number }}

      - name: Run compatibility matrix
        uses: replicatedhq/replicated-actions/compatibility-matrix@v1.20.0
        with:
          app-slug: gameshelf
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          version-label: pr-${{ github.event.pull_request.number }}-${{ github.run_number }}
          distribution: k3s
          version: "1.35"

name: PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version-label: ${{ env.VERSION_LABEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version label
        run: echo "VERSION_LABEL=pr-${{ github.event.pull_request.number }}-${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ghcr.io/aa-replicated/gameshelf:pr-${{ github.event.pull_request.number }}

      - name: Update Helm dependencies
        run: helm dependency update chart/gameshelf

      - name: Create Replicated release
        id: create-release
        uses: replicatedhq/replicated-actions/create-release@v1
        with:
          app-slug: gameshelf
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          yaml-dir: .
          promote-channel: Unstable
          version-label: ${{ env.VERSION_LABEL }}

  compatibility-matrix:
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create cluster
        id: create-cluster
        uses: replicatedhq/replicated-actions/create-cluster@v1
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          kubernetes-distribution: k3s
          kubernetes-version: "1.35"
          cluster-name: gameshelf-pr-${{ github.event.pull_request.number }}
          timeout-minutes: 5
          ttl: 30m

      - name: Update Helm dependencies
        run: helm dependency update chart/gameshelf

      - name: Deploy chart
        env:
          KUBECONFIG: ${{ steps.create-cluster.outputs.cluster-kubeconfig }}
        run: |
          helm upgrade gameshelf chart/gameshelf --install \
            --namespace gameshelf --create-namespace \
            --set image.tag=pr-${{ github.event.pull_request.number }} \
            --set adminSecret=ci-test-secret \
            --set postgresql.enabled=true \
            --set redis.enabled=true \
            --wait --timeout 5m

      - name: Health check
        env:
          KUBECONFIG: ${{ steps.create-cluster.outputs.cluster-kubeconfig }}
        run: |
          kubectl port-forward svc/gameshelf 8080:80 -n gameshelf &
          sleep 5
          curl -f http://localhost:8080/healthz

      - name: Remove cluster
        if: always()
        uses: replicatedhq/replicated-actions/remove-cluster@v1
        continue-on-error: true
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          cluster-id: ${{ steps.create-cluster.outputs.cluster-id }}
